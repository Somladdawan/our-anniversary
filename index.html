<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Som & Yam ❤️ Our Special Days</title>
    <!-- Import Tailwind CSS for modern design -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-gray-800">

    <div class="max-w-md w-full bg-white/80 backdrop-blur-md rounded-3xl shadow-xl p-6 text-center border border-pink-100">
        <!-- Main Header -->
        <h1 class="text-3xl font-bold text-pink-600 mb-2">👩‍❤️‍👩 Som & Yam</h1>
        <p class="text-sm text-gray-500 mb-6">Our Beautiful Journey Together</p>

        <div class="space-y-6">
            <!-- Anniversary Card -->
            <div class="bg-gradient-to-r from-pink-500 to-rose-500 rounded-2xl p-4 text-white shadow-md transform hover:scale-105 transition duration-300">
                <h2 class="text-lg font-medium opacity-90">👩‍❤️‍👩 Happy Anniversary</h2>
                <p class="text-xs opacity-75 mt-0.5">April 13, 2020</p>
                <div id="anniversary-detailed" class="text-xl font-bold mt-2">Calculating...</div>
                <div id="anniversary-total" class="text-xs opacity-80 mt-1"></div>
            </div>

            <!-- First Meet Card -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-pink-100 transform hover:scale-105 transition duration-300">
                <h2 class="text-base font-medium text-gray-600">👀 The Day We First Met</h2>
                <p class="text-xs text-gray-400 mt-0.5">February 12, 2020</p>
                <div id="first-meet-detailed" class="text-lg font-bold text-pink-500 mt-2">Calculating...</div>
                <div id="first-meet-total" class="text-xs text-gray-400 mt-1"></div>
            </div>

            <!-- First Know Card -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-pink-100 transform hover:scale-105 transition duration-300">
                <h2 class="text-base font-medium text-gray-600">💬 The Day We First Met Online / Talked</h2>
                <p class="text-xs text-gray-400 mt-0.5">January 16, 2020</p>
                <div id="first-know-detailed" class="text-lg font-bold text-pink-500 mt-2">Calculating...</div>
                <div id="first-know-total" class="text-xs text-gray-400 mt-1"></div>
            </div>
        </div>

        <footer class="mt-8 text-xs text-pink-400 font-light">
            Made with ❤️ for Som & Yam
        </footer>
    </div>

    <!-- JavaScript Duration Calculations -->
    <script>
        // Start Dates configuration (Year, Month Index (0-11), Day)
        const dates = {
            anniversary: new Date(2020, 3, 13), // 13/04/2020
            firstMeet: new Date(2020, 1, 12),   // 12/02/2020
            firstKnow: new Date(2020, 0, 16)    // 16/01/2020
        };

        function calculateDuration(startDate) {
            const now = new Date();
            
            // 1. Total Days Calculation
            const diffTime = Math.abs(now - startDate);
            const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            // 2. Breakdown: Years / Months / Days
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                const previousMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += previousMonth.getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            return { years, months, days, totalDays };
        }

        function updateDisplay() {
            const keys = ['anniversary', 'firstMeet', 'firstKnow'];
            
            keys.forEach(key => {
                const result = calculateDuration(dates[key]);
                
                // Constructing proper singular/plural strings
                const yText = result.years === 1 ? 'Year' : 'Years';
                const mText = result.months === 1 ? 'Month' : 'Months';
                const dText = result.days === 1 ? 'Day' : 'Days';

                let detailedString = '';
                if (result.years > 0) {
                    detailedString += `${result.years} ${yText} `;
                }
                if (result.months > 0 || result.years > 0) {
                    detailedString += `${result.months} ${mText} `;
                }
                detailedString += `${result.days} ${dText}`;

                document.getElementById(`${key}-detailed`).innerHTML = detailedString;
                
                // Total days string
                document.getElementById(`${key}-total`).innerHTML = 
                    `${result.totalDays.toLocaleString()} days in total`;
            });
        }

        // Run immediately and update every hour
        updateDisplay();
        setInterval(updateDisplay, 3600000); 
    </script>
</body>
</html>
